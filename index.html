<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostOS - Config Individual</title>
    <style>
        body { background: #0d0d0d; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { max-width: 600px; margin: 0 auto; border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        select { background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; padding: 5px; outline: none; cursor: pointer; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #00ff41; padding: 12px; font-size: 1rem; outline: none; box-sizing: border-box; }
        .btns-container { display: flex; gap: 10px; margin-top: 15px; min-height: 40px; }
        button { flex: 1; background: #002b0b; border: 1px solid #00ff41; color: #00ff41; padding: 8px; cursor: pointer; visibility: hidden; transition: 0.2s; }
        button:hover { background: #00ff41; color: #000; }
        .log { font-size: 0.7rem; color: #666; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="controls">
        <h3>> GHOST_CORRECTOR</h3>
        <select id="langSelect" onchange="trocarContexto()">
            <option value="PT">Português</option>
            <option value="EN">English</option>
            <option value="LUA">Lua/Dev</option>
        </select>
    </div>

    <input type="text" id="inputUser" placeholder="Digite aqui..." autocomplete="off">
    
    <div class="btns-container" id="sugestoes">
        <button onclick="completar(this)"></button>
        <button onclick="completar(this)"></button>
        <button onclick="completar(this)"></button>
    </div>

    <div class="log" id="status">Iniciando sistema...</div>
</div>

<script>
    // --- DEFINIÇÕES INDIVIDUAIS ---
    
    const CONFIG_PT = {
        pasta: './dicts/',
        arquivos: ['a.txt', 'b.txt', 'c.txt', 'd.txt', 'e.txt', 'f.txt', 'g.txt', 'h.txt', 'i.txt', 'j.txt', 'k.txt', 'l.txt', 'm.txt', 'n.txt', 'o.txt', 'p.txt', 'q.txt', 'r.txt', 's.txt', 't.txt', 'u.txt', 'v.txt', 'w.txt', 'x.txt', 'y.txt', 'z.txt'],
        regex: /^[a-záàâãéèêíïóôõöúçñ-]+$/
    };

    const CONFIG_EN = {
        pasta: './en/',
        arquivos: ['5.txt', 'common.txt', 'words.txt'], // Seus arquivos específicos
        regex: /^[a-z-]+$/
    };

    const CONFIG_LUA = {
        pasta: './lua/',
        arquivos: ['keywords.txt', 'methods.txt', 'ghost_api.txt'],
        regex: null // Permite qualquer símbolo em código
    };

    const MAPA_LANG = {
        'PT': CONFIG_PT,
        'EN': CONFIG_EN,
        'LUA': CONFIG_LUA
    };

    let bancoGeral = [];

    // --- LÓGICA DE CORE ---

    function getDistancia(s1, s2) {
        let v0 = Array.from({length: s2.length + 1}, (_, i) => i);
        let v1 = [];
        for (let i = 0; i < s1.length; i++) {
            v1[0] = i + 1;
            for (let j = 0; j < s2.length; j++) {
                v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + (s1[i] === s2[j] ? 0 : 1));
            }
            v0 = [...v1];
        }
        return v0[s2.length];
    }

    async function trocarContexto() {
        const lang = document.getElementById('langSelect').value;
        const conf = MAPA_LANG[lang];
        bancoGeral = [];
        await boot(conf);
    }

    async function boot(config) {
        const status = document.getElementById('status');
        try {
            for (const file of config.arquivos) {
                // Atualiza o texto para cada arquivo lido
                status.innerText = `Lendo: ${file}...`;
                
                const res = await fetch(config.pasta + file);
                if (!res.ok) continue;

                const data = await res.text();
                const linhas = data.split(/\r?\n/)
                    .map(p => p.trim().toLowerCase())
                    .filter(p => {
                        if (!p) return false;
                        if (!config.regex) return true;
                        return config.regex.test(p);
                    });

                bancoGeral = [...new Set([...bancoGeral, ...linhas])];
            }
            // Exibe o resultado final após o loop
            status.innerText = `Sistema Online: ${bancoGeral.length} termos carregados.`;
        } catch (err) {
            status.innerText = "Falha no boot da linguagem.";
            console.error(err);
        }
    }


    // --- INTERFACE ---

    const input = document.getElementById('inputUser');
    const botoes = document.querySelectorAll('#sugestoes button');

    input.addEventListener('input', () => {
        const texto = input.value;
        const partes = texto.trim().split(/\s+/);
        const ultima = partes[partes.length - 1].toLowerCase();

        if (!ultima || texto.endsWith(' ')) {
            botoes.forEach(b => b.style.visibility = 'hidden');
            return;
        }

        let matches = bancoGeral.filter(p => p.startsWith(ultima)).slice(0, 3);

        if (matches.length < 3) {
            const fuzzy = bancoGeral
                .map(p => ({ p, d: getDistancia(ultima, p) }))
                .filter(i => i.d <= 2)
                .sort((a, b) => a.d - b.d)
                .map(i => i.p);
            matches = [...new Set([...matches, ...fuzzy])].slice(0, 3);
        }

        botoes.forEach((btn, i) => {
            if (matches[i]) {
                btn.innerText = matches[i];
                btn.style.visibility = 'visible';
            } else {
                btn.style.visibility = 'hidden';
            }
        });
    });

    function completar(btn) {
        const partes = input.value.trim().split(/\s+/);
        partes[partes.length - 1] = btn.innerText;
        input.value = partes.join(' ') + ' ';
        input.focus();
        botoes.forEach(b => b.style.visibility = 'hidden');
    }

    // Boot inicial (Português)
    boot(CONFIG_PT);
</script>

</body>
</html>
